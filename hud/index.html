<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --surface:        rgba(10, 12, 18, 0.92);
  --surface-card:   rgba(18, 22, 32, 0.80);
  --outline:        rgba(255,255,255,0.07);
  --on-surface:     #e1e2ec;
  --on-muted:       #606474;
  --listening:      #00e676;
  --thinking:       #ffab40;
  --speaking:       #40c4ff;
  --idle:           #455a64;
  --radius-lg:      18px;
  --radius-md:      12px;
  --radius-sm:       8px;
  --ease:           cubic-bezier(0.2, 0, 0, 1);
}

body {
  width:100%; height:100vh;
  background: transparent;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  color: var(--on-surface);
  pointer-events: none;
  -webkit-app-region: no-drag;
}

/* ── Root layout: header / main / footer ── */
.hud {
  width:100%; height:100%;
  display: grid;
  grid-template-rows: 44px 1fr 36px;
  gap: 8px;
  padding: 10px;
  position: relative;
}

/* Frosted backdrop */
.hud::before {
  content:'';
  position:absolute; inset:0;
  background: var(--surface);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-radius: var(--radius-lg);
  border: 1px solid var(--outline);
  z-index: 0;
}

/* ── Shared card ── */
.card {
  background: var(--surface-card);
  border: 1px solid var(--outline);
  border-radius: var(--radius-md);
  position: relative;
  z-index: 1;
}

/* ══════════════════ HEADER ══════════════════ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 1;
  position: relative;
}

.logo {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--speaking);
  text-shadow: 0 0 20px rgba(64,196,255,0.35);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--outline);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  color: var(--on-muted);
  transition: all 0.3s var(--ease);
}
.status-pill .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--idle);
  transition: background 0.3s, box-shadow 0.3s;
}
.status-pill.listening { border-color: rgba(0,230,118,0.25); color: var(--listening); }
.status-pill.listening .dot { background: var(--listening); box-shadow: 0 0 10px var(--listening); }
.status-pill.thinking  { border-color: rgba(255,171,64,0.25); color: var(--thinking); }
.status-pill.thinking .dot  { background: var(--thinking); box-shadow: 0 0 10px var(--thinking); animation: pulse 1s ease-in-out infinite; }
.status-pill.speaking  { border-color: rgba(64,196,255,0.25); color: var(--speaking); }
.status-pill.speaking .dot  { background: var(--speaking); box-shadow: 0 0 10px var(--speaking); }

@keyframes pulse {
  0%,100% { opacity:.4; transform:scale(.85); }
  50%      { opacity:1;  transform:scale(1.2); }
}

.clock {
  font-size: 10px;
  color: var(--on-muted);
  letter-spacing: 0.5px;
}

.conn {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #f87171;
  box-shadow: 0 0 6px #f87171;
  transition: all 0.3s;
}
.conn.on { background: #4ade80; box-shadow: 0 0 8px #4ade80; }

/* ══════════════════ MAIN ROW ══════════════════ */
/* video takes ~65%, voice panel ~35% */
.main-row {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 8px;
  z-index: 1;
  position: relative;
  min-height: 0;
}

/* ── VIDEO ── */
.video-card {
  padding: 0;
  overflow: hidden;
  position: relative;
  border-radius: var(--radius-md);
}

.video-card video,
.video-card iframe {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: var(--radius-md);
  display: block;
}

.video-badge {
  position: absolute;
  top: 10px; left: 10px;
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.5);
  background: rgba(0,0,0,0.45);
  padding: 3px 8px;
  border-radius: 6px;
  backdrop-filter: blur(8px);
}

/* ── VOICE PANEL ── */
.voice-panel {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Big waveform card */
.wave-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 24px 16px;
}

.wave-title {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--on-muted);
}

.waveform {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  width: 100%;
  height: 64px;
}

.wbar {
  width: 3px;
  border-radius: 2px;
  background: var(--idle);
  height: 4px;
  transition: height 0.12s var(--ease), background 0.3s;
}

.waveform.listening .wbar {
  background: var(--listening);
  animation: wave 0.5s ease-in-out infinite alternate;
}
.waveform.speaking .wbar {
  background: var(--speaking);
  animation: wave 0.25s ease-in-out infinite alternate;
}
.waveform.thinking .wbar {
  background: var(--thinking);
  animation: wave 1.4s ease-in-out infinite alternate;
}

@keyframes wave {
  from { height: 4px; }
  to   { height: 52px; }
}

/* Thinking dots */
.thinking-row {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.thinking-row.active { display: flex; }
.thinkdot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--thinking);
  animation: bounce 1s ease-in-out infinite;
}
.thinkdot:nth-child(2) { animation-delay: 0.15s; }
.thinkdot:nth-child(3) { animation-delay: 0.30s; }
.think-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  color: var(--thinking);
  opacity: 0.7;
}

@keyframes bounce {
  0%,100% { opacity:.25; transform:scale(.7); }
  50%      { opacity:1;   transform:scale(1.2); }
}

/* Tool chips */
.tools {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 5px;
  min-height: 0;
}
.tool-chip {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  background: rgba(255,171,64,0.06);
  border: 1px solid rgba(255,171,64,0.15);
  border-radius: 20px;
  font-size: 9px;
  color: var(--thinking);
  animation: fadeUp 0.2s var(--ease);
}
.tool-chip .icon { font-size: 11px; }

/* History card */
.history-card {
  padding: 10px 12px;
  max-height: 130px;
  overflow: hidden;
}
.hist-label {
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--on-muted);
  margin-bottom: 6px;
}
.history { display: flex; flex-direction: column; gap: 4px; }
.hist-entry {
  display: flex;
  gap: 6px;
  font-size: 8px;
  line-height: 1.35;
  animation: fadeUp 0.2s var(--ease);
}
.hist-who {
  font-weight: 700;
  letter-spacing: 1px;
  min-width: 12px;
  flex-shrink: 0;
}
.hist-who.you    { color: rgba(64,196,255,0.55); }
.hist-who.jarvis { color: rgba(74,222,128,0.55); }
.hist-text {
  color: var(--on-muted);
  opacity: 0.6;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ══════════════════ FOOTER ══════════════════ */
.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  z-index: 1;
  position: relative;
}
.footer span {
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 1.5px;
  color: var(--on-muted);
  opacity: 0.4;
}

/* ── Shared animations ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(4px); }
  to   { opacity:1; transform:translateY(0); }
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 3px; }
</style>
</head>
<body>

<div class="hud">

  <!-- Header -->
  <div class="header card">
    <div class="logo">JARVIS</div>
    <div class="header-right">
      <div class="status-pill" id="statusPill">
        <div class="dot"></div>
        <span id="statusText">STANDBY</span>
      </div>
      <span class="clock" id="clockLine">--:--</span>
      <div class="conn" id="connDot"></div>
    </div>
  </div>

  <!-- Main row -->
  <div class="main-row">

    <!-- Video (dominant) -->
    <div class="video-card card">
      <video id="hudVideo" autoplay loop muted playsinline>
        <source src="video.mp4" type="video/mp4">
      </video>
      <iframe id="hudIframe" style="display:none;width:100%;height:100%;border:none;" allow="autoplay;encrypted-media;fullscreen" allowfullscreen></iframe>
      <span class="video-badge" id="videoLabel">HUD FEED</span>
    </div>

    <!-- Voice panel -->
    <div class="voice-panel">

      <!-- Big waveform -->
      <div class="wave-card card">
        <div class="wave-title">AUDIO STREAM</div>
        <div class="waveform" id="waveform"></div>
        <div class="thinking-row" id="thinkingRow">
          <div class="thinkdot"></div>
          <div class="thinkdot"></div>
          <div class="thinkdot"></div>
          <span class="think-label">THINKING</span>
        </div>
        <div class="tools" id="toolList"></div>
      </div>

      <!-- Recent turns -->
      <div class="history-card card">
        <div class="hist-label">RECENT TURNS</div>
        <div class="history" id="historyList"></div>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span id="intLabel">0 TURNS</span>
    <span id="footerRight">JARVIS · NESTER LABS</span>
  </div>

</div>

<script>
let interactions = 0;
let toolClearTimer;
let lastJarvisText = '';

const ICONS = {
  open_app:'🚀', chrome_control:'🌐', web_search:'🔍', run_terminal:'⚡',
  system_control:'⚙️', music_control:'🎵', yt_music:'▶️', finder_control:'📁',
  mouse_control:'🖱️', memory_tool:'🧠', send_notification:'🔔', clipboard:'📋',
  gmail:'📧', calendar:'📅'
};

// ── Waveform bars ──
const wf = document.getElementById('waveform');
for (let i = 0; i < 42; i++) {
  const b = document.createElement('div');
  b.className = 'wbar';
  b.style.animationDelay    = (i * 0.035) + 's';
  b.style.animationDuration = (0.28 + Math.random() * 0.5) + 's';
  wf.appendChild(b);
}

// ── Clock ──
function updateClock() {
  const n = new Date();
  document.getElementById('clockLine').textContent =
    n.toTimeString().slice(0,5) + ' · ' +
    n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
}
updateClock();
setInterval(updateClock, 1000);

// ── Status ──
function setStatus(text, cls) {
  const pill = document.getElementById('statusPill');
  pill.className = 'status-pill ' + (cls || '');
  document.getElementById('statusText').textContent = text;
}

window.setConnected = function(v) {
  document.getElementById('connDot').className = 'conn' + (v ? ' on' : '');
};

// ── Events ──
window.onJarvisEvent = function(msg) {
  const { type, data } = msg;

  if (type === 'connected') {
    window.setConnected(true);
  }
  else if (type === 'listening') {
    setStatus('LISTENING', 'listening');
    document.getElementById('waveform').className = 'waveform listening';
    document.getElementById('thinkingRow').classList.remove('active');
    lastJarvisText = '';
  }
  else if (type === 'transcript') {
    addHistory('you', data);
    interactions++;
    document.getElementById('intLabel').textContent = interactions + ' TURNS';
  }
  else if (type === 'thinking') {
    setStatus('THINKING', 'thinking');
    document.getElementById('waveform').className = 'waveform thinking';
    document.getElementById('thinkingRow').classList.add('active');
    document.getElementById('toolList').innerHTML = '';
    lastJarvisText = '';
  }
  else if (type === 'tool_call') {
    document.getElementById('thinkingRow').classList.remove('active');
    const icon = ICONS[data.name] || '🔧';
    const args = JSON.stringify(data.args).replace(/[{}"]/g,'').slice(0,28);
    const chip = document.createElement('div');
    chip.className = 'tool-chip';
    chip.innerHTML = '<span class="icon">' + icon + '</span>' + data.name + (args ? ' · ' + args : '');
    document.getElementById('toolList').appendChild(chip);
  }
  else if (type === 'response_token') {
    document.getElementById('thinkingRow').classList.remove('active');
    setStatus('SPEAKING', 'speaking');
    document.getElementById('waveform').className = 'waveform speaking';
    lastJarvisText += data;
  }
  else if (type === 'speaking') {
    lastJarvisText = data;
  }
  else if (type === 'idle') {
    setStatus('STANDBY', '');
    document.getElementById('waveform').className = 'waveform';
    document.getElementById('thinkingRow').classList.remove('active');
    if (lastJarvisText) addHistory('jarvis', lastJarvisText);
    clearTimeout(toolClearTimer);
    toolClearTimer = setTimeout(function() {
      document.getElementById('toolList').innerHTML = '';
    }, 5000);
  }
};

function addHistory(who, text) {
  const list = document.getElementById('historyList');
  const el = document.createElement('div');
  el.className = 'hist-entry';
  el.innerHTML =
    '<span class="hist-who ' + who + '">' + (who === 'you' ? 'YOU' : 'J') + '</span>' +
    '<span class="hist-text">' + text.slice(0,52) + (text.length>52?'…':'') + '</span>';
  list.insertBefore(el, list.firstChild);
  while (list.children.length > 6) list.removeChild(list.lastChild);
}

// ── WebSocket ──
window.setConnected(false);
function connectWS() {
  const ws = new WebSocket('ws://localhost:7788');
  ws.onopen    = function()  { window.setConnected(true); };
  ws.onmessage = function(e) { try { window.onJarvisEvent(JSON.parse(e.data)); } catch(_){} };
  ws.onclose   = function()  { window.setConnected(false); setTimeout(connectWS, 2000); };
  ws.onerror   = function()  { setTimeout(connectWS, 2000); };
}
connectWS();

// ── Video ──
const hudVideo  = document.getElementById('hudVideo');
const hudIframe = document.getElementById('hudIframe');
const videoLabel = document.getElementById('videoLabel');

function isYouTubeUrl(url) { return url.includes('youtube.com') || url.includes('youtu.be'); }
function extractYouTubeId(url) {
  const m = url.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/watch\?.+&v=))([^&?]+)/);
  return m ? m[1] : null;
}

window.loadVideo = function(url) {
  if (!url) return;
  if (isYouTubeUrl(url)) {
    const id = extractYouTubeId(url);
    if (id) {
      hudVideo.style.display  = 'none';
      hudIframe.style.display = 'block';
      hudIframe.src = 'https://www.youtube.com/embed/' + id + '?autoplay=1&mute=0&controls=1&rel=0&modestbranding=1';
      videoLabel.textContent = 'YOUTUBE';
    }
  } else if (url.startsWith('http')) {
    hudVideo.style.display  = 'none';
    hudIframe.style.display = 'block';
    hudIframe.src = url;
    videoLabel.textContent = 'WEB';
  } else {
    hudIframe.style.display = 'none';
    hudIframe.src = '';
    hudVideo.style.display = 'block';
    hudVideo.src = url;
    hudVideo.play().catch(()=>{});
    videoLabel.textContent = 'LOCAL';
  }
};

window.setVideoLabel = function(text) { videoLabel.textContent = text || 'HUD FEED'; };

// Local video loop
hudVideo.muted = true;
hudVideo.play().catch(()=>{});
</script>
</body>
</html>
