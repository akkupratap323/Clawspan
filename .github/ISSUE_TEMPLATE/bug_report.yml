name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What were you trying to do? What went wrong?
      placeholder: Tell us what you were doing when the bug occurred...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      description: What should have happened instead?
      placeholder: I expected...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      value: |
        1. Run `clawspan ...`
        2. Say/type `...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output / traceback
      description: Paste any error messages or log output.
      render: shell

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. macOS 15 Sequoia
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: e.g. 3.11.6
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Clawspan Version
      placeholder: e.g. commit SHA or tag
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help (config, .env redacted, etc.)
